name: Deploy App Web

on:
  push:
    branches:
      - main
    paths:
      - apps/app/**
      - packages/data/**
      - .fvmrc
      - pubspec.yaml
      - .github/workflows/deploy_app_web.yaml
  workflow_dispatch:

concurrency:
  group: deploy-app-web-production
  cancel-in-progress: false

permissions: {}

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  deploy:
    # Temporarily keep only the conference app's production web deployment disabled.
    # apps/website deployments and apps/app PR previews are not affected.
    if: ${{ vars.ENABLE_APP_WEB_PRODUCTION_DEPLOY == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    env:
      FIREBASE_PROJECT_ID: ${{ vars.PROD_FIREBASE_PROJECT_ID }}
      FIREBASE_WEB_APP_ID: ${{ vars.PROD_APP_FIREBASE_WEB_APP_ID }}
      APP_CHECK_SITE_KEY: ${{ vars.PROD_APP_CHECK_SITE_KEY }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER_PROD }}
      GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT_PROD }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - id: flutter-version
        run: echo "version=$(jq -r .flutter .fvmrc)" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ steps.flutter-version.outputs.version }}
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Validate production Firebase configuration
        run: |
          for name in FIREBASE_PROJECT_ID FIREBASE_WEB_APP_ID APP_CHECK_SITE_KEY \
            GCP_WORKLOAD_IDENTITY_PROVIDER GCP_SERVICE_ACCOUNT; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured as a Repository Variable."
              exit 1
            fi
          done

      - name: Authenticate to Firebase with Workload Identity Federation
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: ${{ vars.PROD_FIREBASE_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER_PROD }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_PROD }}

      - name: Install pinned Firebase configuration tools
        run: |
          npm install --global firebase-tools@13.35.1
          dart pub global activate flutterfire_cli 1.4.0
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Generate production Firebase options
        working-directory: apps/app
        run: >-
          flutterfire configure
          --yes
          --project="$FIREBASE_PROJECT_ID"
          --platforms=web
          --web-app-id="$FIREBASE_WEB_APP_ID"
          --out=lib/firebase_options.dart

      - name: Validate generated production Firebase options
        working-directory: apps/app
        run: |
          grep -Fq "projectId: '$FIREBASE_PROJECT_ID'" lib/firebase_options.dart
          grep -Fq "appId: '$FIREBASE_WEB_APP_ID'" lib/firebase_options.dart

      - name: Build production web app
        working-directory: apps/app
        run: >-
          flutter build web
          --release
          --dart-define-from-file=environments/.env.prod
          --dart-define=FIREBASE_PROJECT_ID=$FIREBASE_PROJECT_ID
          --dart-define=APP_CHECK_SITE_KEY=$APP_CHECK_SITE_KEY
          --dart-define=COMMIT_INFORMATION=${{ github.ref_name }}-${{ github.sha }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/app
          command: deploy
