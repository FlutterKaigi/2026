name: PR Preview Website

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - apps/website/**
      - .github/workflows/preview_website.yaml

concurrency:
  group: preview-website-${{ github.event.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  preview:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      id-token: write # Workload Identity Federation (OIDC) for Firestore auth.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - id: flutter-version
        run: echo "version=$(jq -r .flutter .fvmrc)" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ steps.flutter-version.outputs.version }}
          channel: stable
          cache: true

      - run: dart pub get

      # Authenticate to GCP via Workload Identity Federation (keyless). A
      # service-account access token bypasses App Check enforcement (App Check
      # only gates clients, not trusted backends), so the generator can read the
      # STG `sponsors` collection. Skipped until the WIF vars are configured —
      # then the generator falls back to the sample fixture (placeholders).
      - id: auth
        if: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER_STG != '' }}
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: ${{ vars.STG_FIREBASE_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER_STG }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_STG }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/datastore

      # Generate the (git-ignored) sponsor data + images from the STG Firestore
      # project (packages/data `sponsors` collection). With no token (WIF not yet
      # configured) or if Firestore is unreachable, the generator falls back to
      # the sample fixture so the preview still builds with placeholders.
      - name: Generate sponsor data
        run: dart run tool/generate_sponsors.dart
        env:
          FIREBASE_PROJECT_ID: ${{ vars.STG_FIREBASE_PROJECT_ID }}
          FIRESTORE_HOST: firestore.googleapis.com
          FIRESTORE_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}

      # Empty SITE_ORIGIN → OGP `og:image`/`og:url` are emitted host-relative so
      # they resolve against the per-version preview origin (`*.workers.dev`)
      # rather than the production domain (where this branch's per-sponsor images
      # are not yet deployed). Production deploy keeps the absolute default.
      - working-directory: apps/website
        run: dart run jaspr_cli:jaspr build --dart-define=SITE_ORIGIN=

      - id: deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/website
          command: versions upload

      - uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3.0.1
        with:
          message: |
            ## 🌍 Website Preview
            🔗 ${{ steps.deploy.outputs.deployment-url }}

            🔑 Commit: `${{ github.event.pull_request.head.sha }}`
          comment-tag: deploy-website
