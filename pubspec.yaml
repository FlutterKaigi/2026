name: flutterkaigi_2026
description: FlutterKaigi 2026 monorepo workspace (website + app).
publish_to: none

environment:
  sdk: ">=3.11.0 <4.0.0"

workspace:
  - apps/website
  - apps/app

dev_dependencies:
  melos: ^7.0.0
  http: ^1.2.0
  image: ^4.2.0

melos:
  scripts:
    analyze:website:
      run: melos exec --scope=website -- fvm dart analyze .
      description: Run dart analyze on the jaspr website

    analyze:app:
      run: melos exec --scope=app -- fvm flutter analyze .
      description: Run flutter analyze on the Flutter app

    analyze:
      run: melos run analyze:website && melos run analyze:app
      description: Analyze all packages (website + app)

    format:
      run: melos exec -- fvm dart format .
      description: Format all packages

    test:website:
      run: melos exec --scope=website --dir-exists=test -- fvm dart test
      description: Run tests in the jaspr website

    test:app:
      run: melos exec --scope=app --dir-exists=test -- fvm flutter test
      description: Run tests in the Flutter app (uses flutter test for widget tests)

    test:
      run: melos run test:website && melos run test:app
      description: Run all tests (website + app)

    website:serve:
      run: melos run sponsors:generate && melos exec --scope=website -- fvm dart run jaspr_cli:jaspr serve
      description: Serve the jaspr website in dev mode (regenerates sponsor data first)

    website:build:
      run: melos run sponsors:generate && melos exec --scope=website -- make build
      description: Build the jaspr website for production (regenerates sponsor data first)

    website:start:
      run: |
        melos run website:build \
        && deno run --no-prompt -N -R=apps/website/build/jaspr jsr:@std/http/file-server ./apps/website/build/jaspr
      description: Build the jaspr website and serve the built files with a simple file server (requires Deno to be installed)

    tokens:generate:
      run: fvm dart run tool/generate_tokens.dart
      description: Regenerate apps/website/lib/constants/generated_tokens.dart from docs/design-system/tokens/

    sponsors:generate:
      run: fvm dart run tool/generate_sponsors.dart
      description: Regenerate apps/website/lib/constants/generated_sponsors.dart (+ web/images/sponsors/) from the tracc API or the sample fixture. Git-ignored output.
