name: flutterkaigi_2026
description: FlutterKaigi 2026 monorepo workspace (website + app + dashboard).
publish_to: none

environment:
  sdk: ">=3.11.0 <4.0.0"

workspace:
  - apps/website
  - apps/app
  - apps/dashboard
  - packages/data
  - packages/flutterkaigi_lints
  - services/captions_server
  - apps/broadcaster

dev_dependencies:
  melos: ^7.0.0
  http: ^1.2.0
  image: ^4.2.0

dependency_overrides:
  path_provider_foundation: 2.5.1

melos:
  scripts:
    analyze:website:
      run: fvm dart run melos exec --scope=website -- fvm dart analyze .
      description: Run dart analyze on the jaspr website

    analyze:app:
      run: fvm dart run melos exec --scope=app -- fvm flutter analyze .
      description: Run flutter analyze on the Flutter app

    analyze:dashboard:
      run: fvm dart run melos exec --scope=dashboard -- fvm flutter analyze .
      description: Run flutter analyze on the dashboard app

    analyze:data:
      run: fvm dart run melos exec --scope=data -- fvm flutter analyze .
      description: Run flutter analyze on the data package

    analyze:captions_server:
      run: fvm dart run melos exec --scope=captions_server -- fvm dart analyze .
      description: Run dart analyze on the captions server

    analyze:broadcaster:
      run: fvm dart run melos exec --scope=broadcaster -- fvm flutter analyze .
      description: Run flutter analyze on the broadcaster app

    analyze:
      run: fvm dart run melos run analyze:website && fvm dart run melos run analyze:app && fvm dart run melos run analyze:dashboard && fvm dart run melos run analyze:data && fvm dart run melos run analyze:captions_server && fvm dart run melos run analyze:broadcaster
      description: Analyze all packages (website + app + dashboard + shared packages + services)

    format:
      run: fvm dart run melos exec -- fvm dart format .
      description: Format all packages

    gen:
      run: fvm dart run melos run gen:build
      description: Generate code

    gen:build:
      run: fvm dart run melos run gen:build:app && fvm dart run melos run gen:build:data
      description: Generate build_runner outputs for packages that use code generation

    gen:build:app:
      run: fvm dart run melos exec --scope=app -- fvm flutter pub run build_runner build
      description: Generate build_runner outputs for the Flutter app

    gen:build:data:
      run: fvm dart run melos exec --scope=data -- fvm dart run build_runner build
      description: Generate build_runner outputs for the data package

    test:website:
      run: fvm dart run melos exec --scope=website --dir-exists=test -- fvm dart test
      description: Run tests in the jaspr website

    test:app:
      run: fvm dart run melos exec --scope=app --dir-exists=test -- fvm flutter test
      description: Run tests in the Flutter app (uses flutter test for widget tests)

    test:dashboard:
      run: fvm dart run melos exec --scope=dashboard --dir-exists=test -- fvm flutter test
      description: Run tests in the dashboard app (uses flutter test for widget tests)

    test:data:
      run: fvm dart run melos exec --scope=data --dir-exists=test -- fvm flutter test
      description: Run tests in the data package

    test:captions_server:
      run: fvm dart run melos exec --scope=captions_server --dir-exists=test -- fvm dart test
      description: Run tests in the captions server

    test:
      run: fvm dart run melos run test:website && fvm dart run melos run test:app && fvm dart run melos run test:dashboard && fvm dart run melos run test:data && fvm dart run melos run test:captions_server
      description: Run all tests (website + app + dashboard + shared packages + services)

    website:serve:
      run: fvm dart run melos run sponsors:generate && fvm dart run melos exec --scope=website -- fvm dart run jaspr_cli:jaspr serve
      description: Serve the jaspr website in dev mode (regenerates sponsor data first)

    website:build:
      run: fvm dart run melos run sponsors:generate && fvm dart run melos exec --scope=website -- make build
      description: Build the jaspr website for production (regenerates sponsor data first)

    website:start:
      run: |
        fvm dart run melos run website:build \
        && deno run --no-prompt -N -R=apps/website/build/jaspr jsr:@std/http/file-server ./apps/website/build/jaspr
      description: Build the jaspr website and serve the built files with a simple file server (requires Deno to be installed)

    dashboard:run:dev:
      run: fvm dart run melos exec --scope=dashboard -- fvm flutter run -d chrome --dart-define=FLAVOR=dev
      description: Run the dashboard app in Chrome (dev / emulator)

    dashboard:run:stg:
      run: fvm dart run melos exec --scope=dashboard -- fvm flutter run -d chrome --dart-define=FLAVOR=stg
      description: Run the dashboard app in Chrome (stg)

    dashboard:run:prod:
      run: fvm dart run melos exec --scope=dashboard -- fvm flutter run -d chrome --dart-define=FLAVOR=prod
      description: Run the dashboard app in Chrome (prod)

    dashboard:build:dev:
      run: fvm dart run melos exec --scope=dashboard -- fvm flutter build web --dart-define=FLAVOR=dev
      description: Build the dashboard app for web (dev / emulator)

    dashboard:build:stg:
      run: fvm dart run melos exec --scope=dashboard -- fvm flutter build web --dart-define=FLAVOR=stg
      description: Build the dashboard app for web (stg)

    dashboard:build:prod:
      run: fvm dart run melos exec --scope=dashboard -- fvm flutter build web --dart-define=FLAVOR=prod
      description: Build the dashboard app for web (prod)

    dashboard:deploy:stg:
      run: >
        fvm dart run melos run dashboard:build:stg
        && npx -y firebase-tools@13.35.1 deploy --only hosting --project flutterkaigi-2026-stg
      description: Build and deploy the dashboard to Firebase Hosting (stg)

    dashboard:deploy:prod:
      run: >
        fvm dart run melos run dashboard:build:prod
        && npx -y firebase-tools@13.35.1 deploy --only hosting --project flutterkaigi-2026-283db
      description: Build and deploy the dashboard to Firebase Hosting (prod)

    firebase:start:
      run: npx -y firebase-tools@13.35.1 emulators:start --project dev-flutterkaigi-2026 --only auth,firestore,storage
      description: Start Firebase Emulator Suite for local development (without Functions)

    firebase:start:functions:
      run: >
        npm --prefix functions run build
        && npx -y firebase-tools@13.35.1 emulators:start --project dev-flutterkaigi-2026
      description: Start Firebase Emulator Suite including Cloud Functions (requires `npm install` in functions/)

    firebase:emulators:
      run: fvm dart run melos run firebase:start
      description: Alias for firebase:start

    functions:install:
      run: npm --prefix functions install
      description: Install Cloud Functions dependencies

    functions:build:
      run: npm --prefix functions run build
      description: Type-check and build Cloud Functions (TypeScript)

    functions:deploy:stg:
      run: npx -y firebase-tools@13.35.1 deploy --only functions --project flutterkaigi-2026-stg
      description: Deploy Cloud Functions to the STG project (requires functions/.env, see functions/README.md)

    firebase:schema:validate:
      run: fvm dart run tool/firebase_seed.dart --validate-only packages/data/firebase/seed/firestore/default.json
      description: Validate Firebase seed data against the sample Firestore JSON Schema

    firebase:seed:
      run: fvm dart run tool/firebase_seed.dart packages/data/firebase/seed/firestore/default.json
      description: Seed the running Firestore emulator with local sample data

    firebase:test:
      run: >
        npx -y firebase-tools@13.35.1 emulators:exec --project dev-flutterkaigi-2026 --only firestore
        "fvm dart run tool/firebase_seed.dart packages/data/firebase/seed/firestore/default.json"
      description: Start Firestore Emulator and load local seed data

    captions:serve:
      run: fvm dart run melos run captions:serve:local
      description: Run the captions server locally on port 8082 (fake transcriber + echo translator + console sink)

    captions:serve:local:
      run: fvm dart run melos exec --scope=captions_server -- fvm dart -DCAPTIONS_CONFIG=environments/env.dev run bin/server.dart
      description: Run the local captions server with services/captions_server/environments/env.dev

    captions:serve:local:firestore:
      run: fvm dart run melos exec --scope=captions_server -- fvm dart -DCAPTIONS_CONFIG=environments/env.dev -DCAPTIONS_SINK=firestore run bin/server.dart
      description: Run the local captions server and write captions to the Firestore emulator

    captions:serve:live:
      run: fvm dart run melos run captions:serve:local:live
      description: Run the captions server with real Gemini transcription + translation (requires GEMINI_API_KEY in the environment)

    captions:serve:local:live:
      run: fvm dart run melos exec --scope=captions_server -- fvm dart -DCAPTIONS_CONFIG=environments/env.dev -DCAPTIONS_TRANSCRIBER=gemini -DCAPTIONS_TRANSLATOR=gemini run bin/server.dart
      description: Run the local captions server with Gemini transcription + translation and console output

    captions:serve:local:live:firestore:
      run: fvm dart run melos exec --scope=captions_server -- fvm dart -DCAPTIONS_CONFIG=environments/env.dev -DCAPTIONS_TRANSCRIBER=gemini -DCAPTIONS_TRANSLATOR=gemini -DCAPTIONS_SINK=firestore run bin/server.dart
      description: Run the local captions server with Gemini transcription + translation and Firestore emulator output

    captions:smoke:
      run: fvm dart run melos run captions:smoke:local
      description: Stream synthetic audio to a running captions server and verify it returns caption frames

    captions:smoke:local:
      run: fvm dart run melos exec --scope=captions_server -- fvm dart -DCAPTIONS_CONFIG=environments/env.dev run tool/smoke_client.dart ws://localhost:8082/v1/ingest/room-a
      description: Smoke-test the local captions server with services/captions_server/environments/env.dev

    broadcaster:run:local:
      run: fvm dart run melos exec --scope=broadcaster -- fvm flutter run -d macos --dart-define-from-file=environments/.env.dev
      description: Run the local macOS broadcaster app with apps/broadcaster/environments/.env.dev

    tokens:generate:
      run: fvm dart run tool/generate_tokens.dart
      description: Regenerate apps/website/lib/constants/generated_tokens.dart from docs/design-system/tokens/

    sponsors:generate:
      run: fvm dart run tool/generate_sponsors.dart
      description: Regenerate apps/website/lib/constants/generated_sponsors.dart (+ web/images/sponsors/) from the Firestore emulator (or a configured STG/prod project). Git-ignored output.
